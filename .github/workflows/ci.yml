name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: unit tests (offline, no deps)
        run: |
          python3 tests/test_alignment.py
          python3 tests/test_proxy_units.py
      - name: proxy smoke test (isolated, local mock upstream)
        run: bash tests/proxy_smoke.sh
      - name: coalescing concurrency test (isolated)
        run: bash tests/coalesce_smoke.sh
      - name: keepalive test (isolated)
        run: bash tests/keepalive_smoke.sh
      - name: benchmark (emulator)
        run: python3 benchmarks/bench.py --turns 12
